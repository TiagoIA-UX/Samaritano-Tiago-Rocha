<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Kerneo · seu assistente</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">⚡</span>
        <span class="name">Kerneo</span>
        <span class="tag">lite</span>
      </div>
      <div class="status" id="status" title="Status do servidor e do mic">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">checando…</span>
        <button id="realtime-btn" class="realtime-btn" title="Conversa ao vivo (sem apertar espaço)" aria-label="Conversa ao vivo">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg>
          <span class="realtime-label">AO VIVO</span>
        </button>
        <button id="settings-btn" class="settings-btn" title="Configurações" aria-label="Configurações">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>⚙️ Configurações</h2>
          <button class="modal-close" id="settings-close" aria-label="Fechar">×</button>
        </div>
        <div class="modal-body" id="settings-body">
          <div class="loading">Carregando…</div>
        </div>
      </div>
    </div>

    <section id="chat" class="chat" aria-live="polite"></section>

    <div id="voice-status" class="voice-status hidden">
      <div class="voice-status-inner">
        <span class="voice-icon" id="voice-icon">●</span>
        <span class="voice-text" id="voice-text">…</span>
      </div>
    </div>

    <footer class="composer">
      <button id="mic" class="btn-mic" title="Falar (segure a barra de espaço)" aria-label="Microfone">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
      <input
        id="input"
        type="text"
        placeholder="Pergunta, peça ação, ou pressione o mic…"
        autocomplete="off"
        autofocus
      />
      <button id="send" class="btn-send" title="Enviar (Enter)" aria-label="Enviar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </footer>

    <div class="hint" id="hint">
      <span class="hint-row"><strong>Tente:</strong> <em>"abre a calculadora"</em> · <em>"abre o youtube"</em> · <em>"pesquisa pizza no google"</em> · <em>"que horas são"</em></span>
      <span class="hint-row hint-shortcut">Atalho: segure <kbd>espaço</kbd> para falar</span>
    </div>
  </main>

  <audio id="tts-player" preload="none"></audio>

  <script src="/app.js" defer></script>
</body>
</html>
